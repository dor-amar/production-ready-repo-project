name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r microservices/service1/requirements.txt
        pip install -r microservices/service2/requirements.txt
        pip install flake8 pytest
        
    - name: Lint with flake8
      run: |
        flake8 microservices/service1/
        flake8 microservices/service2/
        
    - name: Test with pytest
      run: |
        cd microservices/service1 && pytest tests/ && cd ../..
        cd microservices/service2 && pytest tests/ && cd ../..
