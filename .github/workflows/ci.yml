name: CI Pipeline

on:
  push:
    branches:
      - main  # Run this workflow on pushes to the `main` branch
  pull_request:
    branches:
      - main  # Also run on pull requests to the `main` branch

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu image for the runner

    steps:
    # Step 1: Check out the repository
    - name: Checkout code
      uses: actions/checkout@v2

    # Step 2: Set up Python
    - name: Set up Python 3.x
      uses: actions/setup-python@v2
      with:
        python-version: 3.8  # Specify your Python version here

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        pip install -r microservices/service1/requirements.txt
        pip install -r microservices/service2/requirements.txt
        pip install -r scripts/requirements.txt  # If you have a separate requirements for scripts

    # Step 4: Run flake8 for linting
    - name: Run flake8
      run: |
        flake8 microservices/service1
        flake8 microservices/service2

    # Step 5: Run tests using pytest
    - name: Run tests
      run: |
        pytest microservices/service1/tests
        pytest microservices/service2/tests
