name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies for service1
      run: |
        pip install -r microservices/service1/requirements.txt
        pip install flake8 pytest

    - name: Run flake8 (linting)
      run: |
        flake8 microservices/service1/
        flake8 microservices/service2/

    - name: Run pytest for service1
      run: |
        pytest microservices/service1/tests/

    - name: Run pytest for service2
      run: |
        pytest microservices/service2/tests/
