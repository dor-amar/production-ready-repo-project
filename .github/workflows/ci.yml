name: CI Workflow

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Install dependencies
      run: |
        pip install -r microservices/service1/requirements.txt
        pip install -r microservices/service2/requirements.txt
    - name: Lint code with flake8
      run: |
        flake8 microservices/service1/
        flake8 microservices/service2/

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Install dependencies
      run: |
        pip install -r microservices/service1/requirements.txt
        pip install -r microservices/service2/requirements.txt
    - name: Run tests with pytest
      run: |
        pytest microservices/service1/tests/
        pytest microservices/service2/tests/
